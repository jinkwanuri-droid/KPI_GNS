<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNWMC KPI DASHBOARD</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js 및 플러그인 필수 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
</head>
<body>
    <!-- 로딩 화면 -->
    <div id="loadingOverlay">
        <div class="loading-content">
            <h1 class="loading-main-title">GNWMC DASHBOARD</h1>
            <div id="loadingBottomArea">
                <div id="loadingStatusArea">
                    <div class="ov-spinner"></div>
                    <div id="ovProgress" class="ov-progress"><div class="ov-progress-fill" style="width: 100%;"></div></div>
                    <div id="ovMsg" class="ov-msg">데이터 로딩 중...</div>
                </div>
                <div id="ovEnterBtnWrap" class="show">
                    <button class="ov-enter-btn" onclick="hideLoadingOverlay()">대시보드 입장하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 상단 네비게이션 -->
    <header id="topbar" class="topbar">
        <div class="logo-container"><span class="logo-title">GNWMC</span></div>
        <div class="topbar-center">
            <div id="navSlider" class="nav-slider"></div>
            <div class="nav-item active" onclick="showView('dashboard', this)">Project</div>
            <div class="nav-item" onclick="showView('members', this)">Working</div>
            <div class="nav-item" onclick="showView('kpieval', this)">Personal KPI</div>
        </div>
        <div class="topbar-right">
            <!-- 필터 슬라이더 -->
            <div class="top-filter-wrap">
                <div class="timeline-container">
                    <div id="yearRow" class="year-row"></div>
                    <div class="track-row">
                        <div class="track-bg"></div>
                        <div id="trackActive" class="track-active"></div>
                        <div id="nodesContainer" class="nodes-container"></div>
                    </div>
                </div>
                <div class="range-summary"><span id="summaryText" class="summary-text">전체 기간</span></div>
                <button class="reset-btn" onclick="resetFilter()">↺</button>
            </div>
        </div>
    </header>

    <!-- 멤버 선택 플로팅 메뉴 -->
    <div id="globalMemberSelectWrap" class="floating-member-select">
        <div id="fmWrapper" class="fm-wrapper">
            <div class="fm-trigger" onclick="toggleDropdown()">
                <div id="fmTriggerAvatar" class="fm-avatar">ALL</div>
            </div>
            <div id="fmOptions" class="fm-options"></div>
        </div>
    </div>

    <!-- 메인 대시보드 뷰 -->
    <main class="main">
        <!-- 1. Project 탭 -->
        <div id="view-dashboard" class="view-section active">
            <div class="card">
                <h2 class="card-section-title">PROJECT OVERALL</h2>
                <div style="display:flex; gap:20px;">
                    <div>총 투입: <span id="ovTotalHour">0h</span></div>
                    <div>참여 인원: <span id="ovTotalMember">0명</span></div>
                    <div>참여 개월: <span id="ovTotalMonth">0개월</span></div>
                    <div>업무일수: <span id="ovActiveDays">0일</span></div>
                </div>
                <div id="projectProgressWrap"></div>
                <div id="ovPjRatioWrap"></div>
            </div>
            
            <div id="topKpiGrid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;"></div>

            <div class="card">
                <div style="height: 300px;"><canvas id="costTrendChart"></canvas></div>
                <div id="costSummaryArea"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="card"><canvas id="stageChart"></canvas><div id="dashStageLegendWrap"></div></div>
                <div class="card"><canvas id="compareChart"></canvas><div id="dashCompareLegendWrap"></div></div>
                <div class="card"><canvas id="donutChart"></canvas><ul id="top5List"></ul></div>
                <div class="card"><canvas id="timelineChart"></canvas><div id="timelineLegendWrap"></div></div>
                <div class="card"><canvas id="dashOvertimeBarChart"></canvas></div>
                <div class="card"><canvas id="dashMonthlyOvertimeChart"></canvas><div id="dashMonthlyOtLegendWrap"></div></div>
                <div class="card"><canvas id="dashOvertimeDonutChart9"></canvas><div id="dashOvertimeDonutLegendWrap"></div></div>
                <div class="card"><canvas id="dashOvertimeDonutChart12"></canvas></div>
            </div>
        </div>

        <!-- 2. Working 탭 -->
        <div id="view-members" class="view-section">
            <div class="card wp-hero">
                <img id="wpProfileImgBg" style="display:none;">
                <h2 id="wpProfileName">멤버이름</h2><span id="wpProfilePos">직급</span>
                <div id="wpContribFill"></div><div id="wpContribPct"></div>
                <div id="wpContribFill2"></div><div id="wpContribPct2"></div>
                <div id="wpStatMonths"></div><div id="wpStatActiveDays"></div>
                <div id="wpStatTotal"></div><div id="wpStatDayAvg"></div>
                <div id="wpStatOt1"></div><div id="wpStatOt2"></div>
                <div id="wpTop3ListOnly"></div>
                <div id="wpAiCommentBox"></div>
                <div id="wpHeroMetricsCards"></div>
                <div style="height:200px;"><canvas id="wpHeroRadar"></canvas></div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="card"><canvas id="wpStackedBar"></canvas><div id="wpStackLegend"></div></div>
                <div class="card"><canvas id="wpDonutSub"></canvas><ul id="wpSubRankList"></ul></div>
                <div class="card"><canvas id="wpDonutCat"></canvas><div id="wpCatCenter"></div></div>
                <div class="card"><canvas id="wpSwitchBar"></canvas></div>
                <div class="card"><canvas id="wpFocusBar"></canvas></div>
                <div class="card"><canvas id="wpOtBar"></canvas><div id="wpOtLegendWrap"></div></div>
                <div class="card"><canvas id="wpGiniChart"></canvas><div id="wpGiniTxt"></div></div>
            </div>
            <div id="wpHeatTabs"></div>
            <div id="wpHeatTable"></div>
        </div>

        <!-- 3. KPI Eval 탭 -->
        <div id="view-kpieval" class="view-section">
            <!-- 자바스크립트에 의해 동적으로 렌더링 됩니다. -->
        </div>
    </main>
    
    <!-- 모달 -->
    <div id="aiModalOverlay" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>AI 상세 분석</h3>
                <button class="modal-close" onclick="closeAiModal()">×</button>
            </div>
            <div id="aiModalBody" class="modal-body"></div>
        </div>
    </div>
</body>
</html>
